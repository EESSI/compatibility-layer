# Vars file for the compatibility layer of EESSI version 2026.06
---
eessi_version: "2026.06"
eessi_host_os: linux
eessi_host_arch: "{{ ansible_architecture }}"

custom_overlays:
  - name: eessi
    source: git
    url: https://github.com/EESSI/gentoo-overlay.git
    eclass-overrides: true
    autosync: false
    commit: a8932a17c5d3a967a799c4ea105644ec295526e2

# Select a specific commit in the gentoo_git_repo that should be used for the bootstrap,
# e.g. by checking: https://github.com/gentoo/gentoo/commits/master
# May 22 2026: commit that includes Lmod 9.2.2
gentoo_git_commit: 06c43f523fcc82bb634720e25c91cf2cfa3b5a5c

prefix_user_defined_trusted_dirs:
  - "/cvmfs/{{ cvmfs_repository }}/versions/{{ eessi_version }}/compat/{{ eessi_host_os }}/{{ eessi_host_arch }}/lib/override"
  - "/cvmfs/{{ cvmfs_repository }}/versions/{{ eessi_version }}/compat/{{ eessi_host_os }}/{{ eessi_host_arch }}/lib/nvidia"
  - "/cvmfs/{{ cvmfs_repository }}/versions/{{ eessi_version }}/compat/{{ eessi_host_os }}/{{ eessi_host_arch }}/lib/amd"

prefix_mask_packages: |
  # stick to GCC 14.x; using a too recent compiler in the compat layer may complicate stuff in the software layer,
  # see for example https://github.com/EESSI/software-layer/issues/151
  >=sys-devel/gcc-15

prefix_unmask_packages: |
  # if necessary, unmask for instance an older GCC to make it installable

prefix_bootstrap_use_flags: |
  # only build libnss, don't build the daemon (use the one from the host)
  sys-auth/nss-pam-ldapd -nslcd
  # don't build the SSSD daemon (and man pages) either
  sys-auth/sssd -daemon -man
  # only install Python 3.13
  */* PYTHON_TARGETS: -* python3_13
  */* PYTHON_SINGLE_TARGET: -* python3_13
  # Modules: disable installation of man pages and shell setup files to be able
  # to also install Lmod. enable *conflict unload* and *require via* features.
  sys-cluster/modules -shell-setup -man-install +new-features

package_sets: []
prefix_packages:
  - name: app-arch/xz-utils
    version: 5.8.2
    overlay: eessi
  - name: app-misc/elfx86exts
    version: 0.6.2
    overlay: eessi
  - name: app-shells/bash-completion
  - name: dev-python/pip
  - name: dev-python/pycodestyle
  - name: dev-python/pyyaml
  - name: dev-python/rich
  - name: dev-util/direnv
    version: 2.36.0
    overlay: eessi
  - name: dev-util/patchelf
  - name: media-fonts/dejavu
  - name: media-fonts/liberation-fonts
  - name: sys-apps/archspec
    version: 0.2.5
    overlay: eessi
  - name: sys-apps/dbus
  - name: sys-auth/nss-pam-ldapd
    version: 0.9.13
    overlay: eessi
  - name: sys-auth/munge
    version: 0.5.16
    overlay: eessi
  - name: sys-auth/sssd
    version: 2.11.0
    overlay: eessi
  - name: sys-cluster/lmod
  - name: sys-cluster/modules
    version: 5.6.1
    overlay: eessi
  - name: sys-cluster/rdma-core
    exclude_on:
      - macos-aarch64
      - macos-x86_64
  - name: sys-fabric/opa-psm2
    version: 12.0.1
    overlay: eessi
    include_on:
      - linux-x86_64
  - name: sys-libs/pam
    exclude_on:
      - macos-aarch64
      - macos-x86_64
  - name: sys-process/numactl

prefix_remove_packages:
  - app-eselect/eselect-rust
  - dev-lang/go
  - dev-lang/go-bootstrap
  - dev-lang/rust
  - dev-lang/rust-bin
  - dev-python/setuptools-rust
  - dev-util/cmake
  - dev-util/hermes
  - dev-util/ninja
  - virtual/rust

# List of locations that should get a (variant) symlink $EPREFIX/$LOCATION -> $LOCATION.
# This ensures that things like user/group ids are correct/looked up in the right way in the Prefix environment.
symlinks_to_host:
  # required to ensure local user groups are known
  - dest: "{{ gentoo_prefix_path }}/etc/ethers"
    src: "$(EESSI_COMPAT_ETC_ETHERS):-/etc/ethers"

  - dest: "{{ gentoo_prefix_path }}/etc/fstab"
    src: "$(EESSI_COMPAT_ETC_FSTAB):-/etc/fstab"

  - dest: "{{ gentoo_prefix_path }}/etc/group"
    src: "$(EESSI_COMPAT_ETC_GROUP):-/etc/group"

  - dest: "{{ gentoo_prefix_path }}/etc/gshadow"
    src: "$(EESSI_COMPAT_ETC_GSHADOW):-/etc/gshadow"

  # required to ensure that hosts specified in the host's hosts file can be resolved by tools in the Prefix
  - dest: "{{ gentoo_prefix_path }}/etc/hosts"
    src: "$(EESSI_COMPAT_ETC_HOSTS):-/etc/hosts"

  - dest: "{{ gentoo_prefix_path }}/etc/hosts.equiv"
    src: "$(EESSI_COMPAT_ETC_HOSTS_EQUIV):-/etc/hosts.equiv"

  - dest: "{{ gentoo_prefix_path }}/etc/ld.so.preload"
    src: "$(EESSI_COMPAT_ETC_LD_SO_PRELOAD):-/etc/ld.so.preload"

  # required to pick up the right timezone from the host
  - dest: "{{ gentoo_prefix_path }}/etc/localtime"
    src: "$(EESSI_COMPAT_ETC_LOCALTIME):-/etc/localtime"

  - dest: "{{ gentoo_prefix_path }}/etc/netgroup"
    src: "$(EESSI_COMPAT_ETC_NETGROUP):-/etc/netgroup"

  - dest: "{{ gentoo_prefix_path }}/etc/networks"
    src: "$(EESSI_COMPAT_ETC_NETWORKS):-/etc/networks"

  # required to ensure name-service information is taken from the right source (e.g. ldap)
  - dest: "{{ gentoo_prefix_path }}/etc/nsswitch.conf"
    src: "$(EESSI_COMPAT_ETC_NSSWITCH_CONF):-/etc/nsswitch.conf"

  # required to ensure local users are known (see https://github.com/EESSI/compatibility-layer/issues/15)
  - dest: "{{ gentoo_prefix_path }}/etc/passwd"
    src: "$(EESSI_COMPAT_ETC_PASSWD):-/etc/passwd"

  - dest: "{{ gentoo_prefix_path }}/etc/protocols"
    src: "$(EESSI_COMPAT_ETC_PROTOCOLS):-/etc/protocols"

  # required to use the DNS resolver from the host (should be done automatically)
  - dest: "{{ gentoo_prefix_path }}/etc/resolv.conf"
    src: "$(EESSI_COMPAT_ETC_RESOLV_CONF):-/etc/resolv.conf"

  - dest: "{{ gentoo_prefix_path }}/etc/rpc"
    src: "$(EESSI_COMPAT_ETC_RPC):-/etc/rpc"

  - dest: "{{ gentoo_prefix_path }}/etc/services"
    src: "$(EESSI_COMPAT_ETC_SERVICES):-/etc/services"

  - dest: "{{ gentoo_prefix_path }}/etc/shadow"
    src: "$(EESSI_COMPAT_ETC_SHADOW):-/etc/shadow"

  - dest: "{{ gentoo_prefix_path }}/usr/sbin/sendmail"
    src: "$(EESSI_COMPAT_SENDMAIL):-/usr/sbin/sendmail"

  - dest: "{{ gentoo_prefix_path }}/var/db/passwd.db"
    src: "$(EESSI_COMPAT_VAR_DB_PASSWD_DB):-/var/db/passwd.db"

  - dest: "{{ gentoo_prefix_path }}/var/log/lastlog"
    src: "$(EESSI_COMPAT_VAR_LOG_LASTLOG):-/var/log/lastlog"

  # required by the last command
  - dest: "{{ gentoo_prefix_path }}/var/log/wtmp"
    src: "$(EESSI_COMPAT_VAR_LOG_WTMP):-/var/log/wtmp"

  - dest: "{{ gentoo_prefix_path }}/var/mail"
    src: "$(EESSI_COMPAT_VAR_MAIL):-/var/mail"

  # required to make runtime data available for lots of tools (including who and w)
  - dest: "{{ gentoo_prefix_path }}/var/run"
    src: "$(EESSI_COMPAT_VAR_RUN):-/var/run"

  - dest: "{{ gentoo_prefix_path }}/var/spool/rwho"
    src: "$(EESSI_COMPAT_VAR_SPOOL_RWHO):-/var/spool/rwho"

#  - dest: "{{ gentoo_prefix_path }}/var/tmp"
#    src: "$(EESSI_COMPAT_VAR_TMP):-/var/tmp"

  # required if Centrify is used in nsswitch.conf
  - dest: "{{ gentoo_prefix_path }}/lib64/libnss_centrifydc.so.2"
    src: "$(EESSI_COMPAT_LIBNSS_CENTRIFYDB):-/lib64/libnss_centrifydc.so.2"

#  - /var/lib/munge
#  - /var/lib/unbound
#  - /var/lib/VirtualGL
#  - /var/log/munge
#  - /var/spool
#  - /var/tmp
#  - /run/dbus
#  - /tmp
