# General configuration of the Prefix installation,
# for instance locale support.
---

# To avoid code duplication, the tasks for updating these portage files could be moved to a separate file,
# which is then included by both prefix_configuration.yml and install_prefix.yml.
- name: "Update package.mask file"
  ansible.builtin.copy:
    dest: "{{ gentoo_prefix_path }}/etc/portage/package.mask"
    content: "{{ prefix_mask_packages }}"
    mode: "0644"
  when: prefix_mask_packages is defined and prefix_mask_packages | length > 0

- name: "Update package.unmask file"
  ansible.builtin.copy:
    dest: "{{ gentoo_prefix_path }}/etc/portage/package.unmask"
    content: "{{ prefix_unmask_packages }}"
    mode: "0644"
  when: prefix_unmask_packages is defined and prefix_unmask_packages | length > 0

- name: "Update package.use file"
  ansible.builtin.copy:
    dest: "{{ gentoo_prefix_path }}/etc/portage/package.use"
    content: "{{ prefix_bootstrap_use_flags }}"
    mode: "0644"
  when: prefix_bootstrap_use_flags is defined and prefix_bootstrap_use_flags | length > 0

- name: Add locales to configuration file
  ansible.builtin.lineinfile:
    path: "{{ gentoo_prefix_path }}/etc/locale.gen"
    line: "{{ item }}"
    state: present
  with_items: "{{ prefix_locales }}"
  notify: Generate locales

- name: Flush handlers to generate new locales.
  ansible.builtin.meta: flush_handlers
...
